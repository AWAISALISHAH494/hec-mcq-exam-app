const quizContainer = document.getElementById('quiz-container');

function createQuiz() {
    quizData.forEach((q, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.id = `q-${index}`;
        
        const qTitle = document.createElement('div');
        qTitle.className = 'q-title';
        qTitle.innerText = `${q.id}. ${q.question}`;
        qDiv.appendChild(qTitle);
        
        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';
        
        q.options.forEach((opt, optIndex) => {
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `question${index}`;
            radio.value = optIndex;
            radio.style.marginRight = '10px';
            
            label.appendChild(radio);
            label.appendChild(document.createTextNode(opt));
            optionsDiv.appendChild(label);
        });
        
        qDiv.appendChild(optionsDiv);
        
        const feedbackDiv = document.createElement('div');
        feedbackDiv.className = 'feedback';
        feedbackDiv.id = `feedback-${index}`;
        feedbackDiv.style.display = 'none';
        qDiv.appendChild(feedbackDiv);
        
        quizContainer.appendChild(qDiv);
    });
}

function submitQuiz() {
    let score = 0;
    
    quizData.forEach((q, index) => {
        const selected = document.querySelector(`input[name="question${index}"]:checked`);
        
        // 1. Highlight the actually correct answer in green
        const correctRadio = document.querySelector(`input[name="question${index}"][value="${q.answer}"]`);
        if (correctRadio) {
            const correctLabel = correctRadio.parentElement;
            correctLabel.style.backgroundColor = '#d4edda';
            correctLabel.style.borderColor = '#c3e6cb';
            correctLabel.style.color = '#155724';
            correctLabel.style.fontWeight = 'bold';
        }

        if (selected) {
            const userAnswer = parseInt(selected.value);
            if (userAnswer === q.answer) {
                score++;
            } else {
                // 2. User chose wrong answer, highlight their choice in red
                const wrongLabel = selected.parentElement;
                wrongLabel.style.backgroundColor = '#f8d7da';
                wrongLabel.style.borderColor = '#f5c6cb';
                wrongLabel.style.color = '#721c24';
                wrongLabel.style.textDecoration = 'line-through';
            }
        }
        
        // Hide the feedback div since we are coloring labels instead
        const feedbackDiv = document.getElementById(`feedback-${index}`);
        if(feedbackDiv) feedbackDiv.style.display = 'none';
        
        // Disable all radio buttons
        const radios = document.querySelectorAll(`input[name="question${index}"]`);
        radios.forEach(r => r.disabled = true);
    });
    
    // Hide the submit button
    document.querySelector('.submit-btn').style.display = 'none';
    
    // Move results div to the top
    const resultsDiv = document.getElementById('results');
    const container = document.querySelector('.container');
    const quizContainer = document.getElementById('quiz-container');
    container.insertBefore(resultsDiv, quizContainer);
    
    resultsDiv.style.display = 'block';
    
    const scoreText = document.getElementById('score-text');
    scoreText.innerText = `${score} / ${quizData.length}`;
    
    const scoreMsg = document.getElementById('score-msg');
    const percentage = (score / quizData.length) * 100;
    if (percentage >= 80) scoreMsg.innerText = "Fantastic! You are highly proficient!";
    else if (percentage >= 60) scoreMsg.innerText = "Good job! You have a solid grasp of the concepts.";
    else if (percentage >= 40) scoreMsg.innerText = "You passed, but there's room for improvement in some areas.";
    else scoreMsg.innerText = "Keep studying! Review the areas where you struggled.";
    
    // Quick scroll to top to see results
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

createQuiz();
